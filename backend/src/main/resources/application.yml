spring:
  application:
    name: logistick
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/logstickproject}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
